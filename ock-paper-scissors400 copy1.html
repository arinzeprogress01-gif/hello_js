<body>
    <p>rock paper scissors</p>
    <button onclick="
        playerLabel('rock');
    ">rock</button>
    <button onclick="
        playerLabel('paper');
    ">paper</button>
    <button onclick="
          playerLabel('scissors');
    ">scissors</button>
    <script>

        function playerLabel(playerChoice) {
            const computerMove = pickcomputerMove();

            let result = '';

            if (playerChoice === 'rock') {

                if (computerMove === 'rock') {
                    let result = 'tie';
                } else if (computerMove === 'paper') {
                    let result = 'you lose';
                } else if (computerMove === 'scissors') {
                    let result = 'you win'
                }
               

            } else if (playerChoice === 'paper') {

                if (computerMove === 'rock') {
                    let result = 'you lose';
                } else if (computerMove === 'paper') {
                    let result = 'you win';
                } else if (computerMove === 'scissors') {
                    let result = 'tie'
                }

            } else if (playerChoice === 'scissors') {
                
                if (computerMove === 'rock') {
                    let result = 'you win';
                } else if (computerMove === 'paper') {
                    let result = 'tie';
                } else if (computerMove === 'scissors') {
                    let result = 'you lose'
                }
            }
            alert(`you picked ${playerChoice}. computer picked ${computerMove} . ${result}`)
        }

            

    

        function pickcomputerMove() {

            const randomNumber = Math.random();

            let computerMove = '';

            if (randomNumber > 0 && randomNumber < 2 / 3) {
                computerMove = 'rock';
            } else if (randomNumber > 2 / 3 && randomNumber < 1 / 3) {
                computerMove = 'paper';
            } else if (randomNumber > 1 / 3 && randomNumber < 1) {
                computerMove = 'scissors'
            }
            return computerMove;
        }
    </script>
